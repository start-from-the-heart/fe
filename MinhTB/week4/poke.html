<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokémon Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
    }
    h1 {
      color: #e63946;
    }
    .pokemon-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .pokemon-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 180px;
    }
    .pokemon-card img {
      width: 120px;
      height: 120px;
    }
    .pokemon-card h2 {
      margin: 10px 0 5px;
      text-transform: capitalize;
    }
  </style>
</head>
<body>
  <h1>Pokémon Viewer</h1>
  <div class="pokemon-container" id="pokemonContainer"></div>

  <script>
    async function getManyPokemon(names) {
      try {
        // Gửi nhiều request cùng lúc
        const requests = names.map((name) =>
          fetch(`https://pokeapi.co/api/v2/pokemon/${name}`)
        );

        // Chờ tất cả responses
        const responses = await Promise.all(requests);

        // Chuyển sang JSON
        const dataPromises = responses.map((res) => {
          if (!res.ok) throw new Error("Không tìm thấy Pokémon!");
          return res.json();
        });

        const pokemons = await Promise.all(dataPromises);

        // Hiển thị ra màn hình
        const container = document.getElementById("pokemonContainer");
        container.innerHTML = pokemons
          .map(
            (p) => `
            <div class="pokemon-card">
              <h2>${p.name}</h2>
              <img src="${p.sprites.front_default}" alt="${p.name}">
              <p>Chiều cao: ${p.height}</p>
              <p>Cân nặng: ${p.weight}</p>
            </div>
          `
          )
          .join("");
      } catch (error) {
        document.getElementById("pokemonContainer").innerHTML =
          `<p style="color:red;">${error.message}</p>`;
      }
    }

    // Gọi thử với 3 Pokémon
    getManyPokemon(["pikachu", "charizard", "bulbasaur"]);
  </script>
</body>
</html>
