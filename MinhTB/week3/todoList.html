<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Todo List Full</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      input,
      button {
        padding: 5px;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 5px 0;
      }
      .deleteBtn {
        color: white;
        background: red;
        border: none;
        padding: 3px 8px;
        cursor: pointer;
      }
      .editBtn {
        color: white;
        background: orange;
        border: none;
        padding: 3px 8px;
        cursor: pointer;
      }
      .completeBtn {
        color: white;
        background: green;
        border: none;
        padding: 3px 8px;
        cursor: pointer;
      }
      .completed {
        text-decoration: line-through;
        color: gray;
      }
    </style>
  </head>
  <body>
    <h1>Todo List</h1>
    <input type="text" id="taskInput" placeholder="Nhập công việc..." />
    <button id="addBtn">Thêm</button>

    <ul id="taskList"></ul>

    <script>
      const taskInput = document.getElementById("taskInput");
      const addBtn = document.getElementById("addBtn");
      const taskList = document.getElementById("taskList");

      // Lấy dữ liệu từ LocalStorage
      let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
      renderTasks();

      // Hàm render danh sách task
      function renderTasks() {
        taskList.innerHTML = "";
        tasks.forEach((task, index) => {
          const li = document.createElement("li");
          li.innerHTML = `
        <span class="${task.completed ? "completed" : ""}">${task.text}</span>
        <div>
          <button class="completeBtn">✔</button>
          <button class="editBtn">✏️</button>
          <button class="deleteBtn">X</button>
        </div>
      `;
          li.dataset.index = index;
          taskList.appendChild(li);
        });
      }

      // Hàm lưu dữ liệu
      function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
      }

      // Thêm công việc mới
      addBtn.addEventListener("click", () => {
        const taskText = taskInput.value.trim();
        if (taskText === "") return;

        tasks.push({ text: taskText, completed: false });
        saveTasks();
        renderTasks();

        taskInput.value = "";
      });

      // Xử lý click (Event Delegation)
      taskList.addEventListener("click", (e) => {
        const li = e.target.closest("li");
        if (!li) return;
        const index = li.dataset.index;

        if (e.target.classList.contains("deleteBtn")) {
          // Xóa công việc
          tasks.splice(index, 1);
        } else if (e.target.classList.contains("completeBtn")) {
          // Đánh dấu hoàn thành
          tasks[index].completed = !tasks[index].completed;
        } else if (e.target.classList.contains("editBtn")) {
          // Sửa công việc
          const newText = prompt("Sửa công việc:", tasks[index].text);
          if (newText !== null && newText.trim() !== "") {
            tasks[index].text = newText.trim();
          }
        }

        saveTasks();
        renderTasks();
      });
    </script>
  </body>
</html>
