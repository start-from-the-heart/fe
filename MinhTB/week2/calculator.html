<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="calculator.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="calculator-container">
      <div class="display">
        <!-- <div class="history" id="history">0D</div> -->
        <div class="result" id="result">0</div>
      </div>
      
      <div class="buttons">
        <button class="btn function" data-action="clear">AC</button>
        <button class="btn function" data-action="delete">DEL</button>
        <button class="btn operator" data-action="%">%</button>
        <button class="btn operator" data-action="/">÷</button>

        <button class="btn number">7</button>
        <button class="btn number">8</button>
        <button class="btn number">9</button>
        <button class="btn operator" data-action="*">×</button>

        <button class="btn number">4</button>
        <button class="btn number">5</button>
        <button class="btn number">6</button>
        <button class="btn operator" data-action="-">−</button>

        <button class="btn number">1</button>
        <button class="btn number">2</button>
        <button class="btn number">3</button>
        <button class="btn operator" data-action="+">+</button>

        <button class="btn function" data-action="+/-">±</button>
        <button class="btn number">0</button>
        <button class="btn number">.</button>
        <button class="btn equals" data-action="=">=</button>
      </div>
    </div>
  </body>
  <script src="calculator.js" defer></script>
</html>
